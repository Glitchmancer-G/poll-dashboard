<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Admin</title>
    <script type="module" src="dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'IBM Plex Sans', sans-serif; }
        .mono { font-family: 'IBM Plex Mono', monospace; }

        .question-row.dragging  { opacity: 0.3; transform: scale(0.98); }
        .question-row.drag-over { outline: 2px solid #f59e0b; background: rgba(245,158,11,0.06); border-radius: 10px; }

        ::-webkit-scrollbar           { width: 5px; }
        ::-webkit-scrollbar-track     { background: transparent; }
        ::-webkit-scrollbar-thumb     { background: #d4d4d8; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
    </style>
</head>

<body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 min-h-screen transition-colors duration-200">

    <!-- Header -->
    <header class="sticky top-0 z-50 border-b border-zinc-200 dark:border-zinc-800 bg-white/95 dark:bg-zinc-950/95 backdrop-blur-sm transition-colors duration-200">
        <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">

            <div class="flex items-center gap-3">
                <span class="mono text-amber-500 dark:text-amber-400 font-medium">▸</span>
                <span class="mono text-sm font-medium tracking-widest text-zinc-800 dark:text-zinc-100">POLL ADMIN</span>
            </div>

            <div class="flex items-center gap-3">
                <!-- Dark mode toggle -->
                <button id="theme-toggle"
                    class="w-9 h-9 flex items-center justify-center rounded-lg border border-zinc-200 dark:border-zinc-700 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 hover:border-zinc-300 dark:hover:border-zinc-600 transition-all duration-150 cursor-pointer"
                    title="Toggle dark mode">
                    <!-- Sun (shown in dark mode) -->
                    <svg id="icon-sun" class="hidden w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <!-- Moon (shown in light mode) -->
                    <svg id="icon-moon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>

                <!-- Google login -->
                <button id="google-login"
                    class="flex items-center gap-2 bg-white dark:bg-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-700 border border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-500 text-zinc-700 dark:text-zinc-200 text-sm font-medium px-4 py-2 rounded-lg transition-all duration-150 cursor-pointer shadow-sm">
                    <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Sign in with Google
                </button>
            </div>

        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8">
        <div id="dashboard" class="hidden space-y-8">

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 shadow-sm">
                    <div class="mono text-3xl font-medium text-zinc-900 dark:text-white mb-1" id="participants">0</div>
                    <div class="text-xs font-medium text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">Participants</div>
                </div>
                <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 shadow-sm">
                    <div class="mono text-3xl font-medium text-zinc-900 dark:text-white mb-1" id="votes">0</div>
                    <div class="text-xs font-medium text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">Responses</div>
                </div>
                <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 shadow-sm">
                    <div class="mono text-3xl font-medium text-zinc-900 dark:text-white mb-1" id="questions-count">0</div>
                    <div class="text-xs font-medium text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">Questions</div>
                </div>
            </div>

            <!-- Question Editor -->
            <div id="question-editor"
                class="hidden bg-white dark:bg-zinc-900 border border-amber-300 dark:border-amber-400/30 rounded-xl p-6 shadow-md dark:shadow-xl transition-colors duration-200">

                <div class="flex items-center gap-2 mb-5">
                    <span class="text-amber-500 dark:text-amber-400 text-sm">✦</span>
                    <h3 id="editor-title" class="mono text-xs font-medium text-zinc-500 dark:text-zinc-400 uppercase tracking-widest">New Question</h3>
                </div>

                <div class="flex gap-3 mb-5 flex-wrap">
                    <div class="flex-1 min-w-48 space-y-1.5">
                        <label class="mono text-xs text-zinc-400 dark:text-zinc-500 uppercase tracking-widest block">Question text</label>
                        <input id="question-text" type="text" placeholder="e.g. What is your favourite tool?"
                            class="w-full bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 focus:border-amber-400 dark:focus:border-amber-400/50 focus:outline-none text-zinc-900 dark:text-zinc-100 text-sm rounded-lg px-3 py-2.5 placeholder-zinc-400 dark:placeholder-zinc-600 transition-colors">
                    </div>
                    <div class="w-44 space-y-1.5">
                        <label class="mono text-xs text-zinc-400 dark:text-zinc-500 uppercase tracking-widest block">Type</label>
                        <select id="question-type"
                            class="w-full bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 focus:border-amber-400 dark:focus:border-amber-400/50 focus:outline-none text-zinc-900 dark:text-zinc-100 text-sm rounded-lg px-3 py-2.5 transition-colors cursor-pointer">
                            <option value="mcq">Multiple choice</option>
                            <option value="text">Text answer</option>
                        </select>
                    </div>
                </div>

                <div id="answers-section">
                    <label class="mono text-xs text-zinc-400 dark:text-zinc-500 uppercase tracking-widest block mb-2">Options</label>
                    <div id="answers-container" class="space-y-2 mb-3"></div>
                    <button id="add-answer"
                        class="text-xs font-medium text-zinc-400 dark:text-zinc-500 hover:text-amber-500 dark:hover:text-amber-400 border border-zinc-200 dark:border-zinc-700 hover:border-amber-300 dark:hover:border-amber-400/40 rounded-lg px-3 py-1.5 transition-all duration-150 cursor-pointer">
                        + Add option
                    </button>
                </div>

                <div class="flex gap-2 mt-5 pt-5 border-t border-zinc-100 dark:border-zinc-800">
                    <button id="save-question"
                        class="bg-amber-400 hover:bg-amber-500 active:bg-amber-600 text-white dark:text-zinc-950 text-sm font-semibold px-5 py-2 rounded-lg transition-all duration-150 cursor-pointer shadow-sm">
                        Save question
                    </button>
                    <button id="cancel-edit"
                        class="text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 border border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-500 text-sm font-medium px-4 py-2 rounded-lg transition-all duration-150 cursor-pointer">
                        Cancel
                    </button>
                </div>
            </div>

            <!-- Questions List -->
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="mono text-xs font-medium text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">Questions</h2>
                    <div class="flex items-center gap-4">
                        <span id="save-indicator" class="mono text-xs opacity-0 transition-opacity duration-200 flex items-center gap-1.5">
                            <span id="save-dot" class="w-1.5 h-1.5 rounded-full bg-zinc-400 dark:bg-zinc-500 inline-block transition-colors"></span>
                            <span id="save-text" class="text-zinc-400 dark:text-zinc-500">Saving…</span>
                        </span>
                        <button id="add-question"
                            class="bg-amber-400 hover:bg-amber-500 active:bg-amber-600 text-white dark:text-zinc-950 mono text-xs font-semibold px-4 py-2 rounded-lg transition-all duration-150 cursor-pointer flex items-center gap-1 shadow-sm">
                            + New
                        </button>
                    </div>
                </div>

                <ul id="questions-list" class="space-y-1.5"></ul>

                <p class="mono text-xs text-zinc-300 dark:text-zinc-700 mt-3">⠿ drag to reorder</p>
            </div>

            <!-- Live Results -->
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="mono text-xs font-medium text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">Live Results</h2>
                    <button id="export-csv"
                        class="text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 border border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-500 mono text-xs font-medium px-4 py-2 rounded-lg transition-all duration-150 cursor-pointer flex items-center gap-1.5">
                        ↓ Export CSV
                    </button>
                </div>
                <div id="charts-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

        </div>
    </main>

    <script>
        // Theme toggle — persists to localStorage
        const html = document.documentElement
        const toggle = document.getElementById('theme-toggle')
        const iconSun = document.getElementById('icon-sun')
        const iconMoon = document.getElementById('icon-moon')

        function applyTheme(dark) {
            html.classList.toggle('dark', dark)
            iconSun.classList.toggle('hidden', !dark)
            iconMoon.classList.toggle('hidden', dark)
        }

        // Init: respect saved preference, fallback to light
        const saved = localStorage.getItem('theme')
        applyTheme(saved === 'dark')

        toggle.addEventListener('click', () => {
            const isDark = html.classList.contains('dark')
            applyTheme(!isDark)
            localStorage.setItem('theme', isDark ? 'light' : 'dark')
        })
    </script>

</body>
</html>
